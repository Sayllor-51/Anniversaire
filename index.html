<head>

<link href="https://fonts.googleapis.com/css2?family=Rye&family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>

<body>

<!-- (HTML IDENTIQUE - aucun changement nécessaire) -->

<!-- Firebase + JS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDdYbVOIyhQvHpzL2CbL9sCtoM5YJWLeuY",
  authDomain: "alexandre50.firebaseapp.com",
  projectId: "alexandre50",
  storageBucket: "alexandre50.firebasestorage.app",
  messagingSenderId: "159600747281",
  appId: "1:159600747281:web:09f382f707b2c481a922b0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* QUESTIONS inchangées */
const QUESTIONS = { /* ... ton bloc complet inchangé ... */ };

const POINTS = { vins:3, fromages:2, charcuteries:2, chips:1 };
const MAX_SCORE = 46;
const TOTAL_Q = 24;

let currentPlayer = null;
let answers = {};
let allScores = {};

/* INIT inchangé */
function init() {
  const saved = localStorage.getItem('alex50_player');
  if (saved) {
    currentPlayer = JSON.parse(saved);
    const savedAns = localStorage.getItem('alex50_answers_' + currentPlayer.id);
    if (savedAns) answers = JSON.parse(savedAns);
  }

  const scoresCol = collection(db, 'scores');
  onSnapshot(scoresCol, (snapshot) => {
    allScores = {};
    snapshot.forEach(docSnap => { allScores[docSnap.id] = docSnap.data(); });
    renderLeaderboard();
  });
}

/* NAV inchangé */
window.showPanel = function(name) { /* inchangé */ };

/* REGISTER inchangé */
window.registerPlayer = async function() { /* inchangé */ };
window.confirmRegister = function(name, table) { /* inchangé */ };

/* QUIZ */
function setupQuiz() {
  if (!currentPlayer) return;
  renderCategory('vins', 'quiz-vins');
  renderCategory('fromages', 'quiz-fromages');
  renderCategory('charcuteries', 'quiz-charcuteries');
  renderCategory('chips', 'quiz-chips');
  updateProgress();
}

/* ✅ MODIF ICI */
function renderCategory(cat, containerId) {
  const container = document.getElementById(containerId);
  let html = '';

  QUESTIONS[cat].forEach((q) => {
    const answered = answers[q.id] !== undefined;

    html += `<div class="question-block">
      <div class="question-title">${q.label}</div>
      <div class="options-grid">`;

    q.options.forEach((opt, oi) => {
      let cls = 'opt-btn';

      if (answered) {
        cls += ' locked';
        if (oi === answers[q.id]) cls += ' selected'; // ✅ seulement le choix
      }

      html += `<button class="${cls}" onclick="selectAnswer('${q.id}','${cat}',${oi},this)">
        ${opt}
      </button>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

/* ✅ MODIF ICI */
window.selectAnswer = async function(qId, cat, optionIdx, btn) {
  if (answers[qId] !== undefined) return;

  answers[qId] = optionIdx;
  localStorage.setItem('alex50_answers_' + currentPlayer.id, JSON.stringify(answers));

  const grid = btn.closest('.options-grid');

  grid.querySelectorAll('.opt-btn').forEach((b, index) => {
    b.classList.add('locked');
    if (index === optionIdx) b.classList.add('selected'); // ✅ uniquement sélection
  });

  updateProgress();
  await pushScore();
};

function computeScore() {
  let total = 0;

  for (const [cat, questions] of Object.entries(QUESTIONS)) {
    questions.forEach(q => {
      if (answers[q.id] === q.answer) {
        total += POINTS[cat];
      }
    });
  }

  return total;
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  document.getElementById('quiz-progress').style.width =
    (answered / TOTAL_Q * 100) + '%';
}

async function pushScore() {
  if (!currentPlayer) return;

  const total = computeScore();

  await setDoc(doc(db, 'scores', currentPlayer.id), {
    name: currentPlayer.name,
    score: total
  });
}

/* LEADERBOARD simplifié */
function renderLeaderboard() {
  const players = Object.values(allScores).sort((a,b) => b.score - a.score);

  const container = document.getElementById('leaderboard-content');

  if (!players.length) {
    container.innerHTML = "Aucun joueur";
    return;
  }

  let html = "<ul>";
  players.forEach(p => {
    html += `<li>${p.name} — ${p.score}</li>`;
  });
  html += "</ul>";

  container.innerHTML = html;
}

init();
</script>

</body>
</html>
