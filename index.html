<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤠 Alexandre a 50 ans !</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brown: #5C3A1E;
    --brown-light: #8B5E3C;
    --gold: #C9930A;
    --gold-light: #F0B429;
    --cream: #F5EDD6;
    --cream-dark: #E8D9B5;
    --red: #8B1A1A;
    --text-dark: #2C1810;
    --shadow: rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--brown);
    background-image:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 12px),
      repeating-linear-gradient(-45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 12px);
    font-family: 'Lato', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, var(--red) 0%, var(--brown) 50%, var(--red) 100%);
    border-bottom: 6px solid var(--gold);
    text-align: center;
    padding: 1.5rem 1rem 1rem;
    position: relative;
  }
  .header h1 {
    font-family: 'Rye', serif;
    font-size: clamp(1.8rem, 6vw, 3.2rem);
    color: var(--gold-light);
    text-shadow: 3px 3px 0 var(--brown);
  }
  .nav {
    display: flex; justify-content: center; background: var(--brown);
    border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100;
  }
  .nav-btn {
    background: none; border: none; color: var(--cream-dark);
    padding: 0.9rem 1.2rem; cursor: pointer; font-family: 'Lato';
    font-weight: 700; text-transform: uppercase; border-bottom: 3px solid transparent;
  }
  .nav-btn.active { color: var(--gold-light); border-bottom-color: var(--gold-light); }
  .main { max-width: 760px; margin: 0 auto; padding: 1rem; }
  .card {
    background: var(--cream); border-radius: 12px; border: 2px solid var(--gold);
    box-shadow: 0 6px 20px var(--shadow); margin-bottom: 1rem; overflow: hidden;
  }
  .card-header {
    background: linear-gradient(90deg, var(--brown) 0%, var(--brown-light) 100%);
    color: var(--gold-light); font-family: 'Rye'; padding: 0.7rem 1.1rem;
  }
  .card-body { padding: 1rem; }
  .panel { display: none; }
  .panel.active { display: block; }
  
  /* MODAL */
  .modal {
    display: none; position: fixed; z-index: 1000; left: 0; top: 0;
    width: 100%; height: 100%; background: rgba(0,0,0,0.85);
  }
  .modal-content {
    background: var(--cream); margin: 20% auto; padding: 2rem;
    border: 4px solid var(--gold); width: 85%; max-width: 450px;
    border-radius: 15px; text-align: center;
  }

  .input-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 1rem; }
  .input-group label { font-weight: 700; font-size: 0.8rem; color: var(--brown); text-transform: uppercase; }
  input[type="text"] { padding: 0.7rem; border: 2px solid var(--brown-light); border-radius: 8px; }
  
  .btn {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: var(--brown); border: none; border-radius: 8px; padding: 0.8rem;
    font-family: 'Rye'; cursor: pointer; width: 100%;
  }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.5rem; }
  .opt-btn {
    background: white; border: 2px solid var(--cream-dark); border-radius: 8px;
    padding: 0.6rem; cursor: pointer; transition: all 0.2s;
  }
  /* Style quand on a cliqué : reste neutre (brun/doré) mais verrouillé */
  .opt-btn.selected-hidden {
    background: var(--brown);
    color: var(--gold-light);
    border-color: var(--gold);
    font-weight: bold;
  }
  .opt-btn.locked { pointer-events: none; opacity: 0.6; }
  .opt-btn.selected-hidden.locked { opacity: 1; } /* On garde bien visible celui qu'on a choisi */

  .progress-bar { background: var(--cream-dark); border-radius: 10px; height: 10px; margin: 10px 0; }
  .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.3s; border-radius: 10px; }
  
  .leaderboard-table { width: 100%; border-collapse: collapse; }
  .leaderboard-table td, .leaderboard-table th { padding: 0.8rem; border-bottom: 1px solid var(--cream-dark); }
  .rank-badge { background: var(--gold); color: var(--brown); padding: 4px 8px; border-radius: 50%; font-weight: bold; }
  
  .footer { text-align: center; padding: 2rem; color: var(--cream); opacity: 0.6; font-size: 0.8rem; }
</style>
</head>
<body>

<div id="finishModal" class="modal">
  <div class="modal-content">
    <h2 style="font-family:'Rye'; margin-bottom:1rem;">🌵 Bravo ! 🌵</h2>
    <p>Dégustation terminée.</p>
    <p id="finalScoreMsg" style="font-size:1.3rem; font-weight:bold; margin: 1rem 0;"></p>
    <button class="btn" onclick="closeModal()">Voir le classement</button>
  </div>
</div>

<div class="header">
  <h1>🤠 Alexandre a 50 ans !</h1>
  <div style="color:var(--cream); letter-spacing:2px;">WILD WEST PARTY</div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPanel('register')">Inscription</button>
  <button class="nav-btn" onclick="showPanel('quiz')">Dégustation</button>
  <button class="nav-btn" onclick="showPanel('leaderboard')">Classement</button>
</nav>

<div class="main">
  <div id="panel-register" class="panel active">
    <div class="card">
      <div class="card-header">🐴 Inscription</div>
      <div class="card-body">
        <div class="input-group">
          <label>Prénom(s)</label>
          <input type="text" id="player-name" placeholder="ex. Marie & Evangéline">
        </div>
        <div class="input-group">
          <label>Groupe / Table</label>
          <input type="text" id="player-table" placeholder="ex. Les Cousins du Sud">
        </div>
        <button class="btn" onclick="registerPlayer()">Lancer la dégustation</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header">📜 Règlement</div>
      <div class="card-body" style="font-size:0.9rem; line-height:1.6;">
        <p style="color:var(--red); font-weight:bold; text-align:center; border:1px solid var(--red); padding:5px; margin-bottom:10px;">⚠️ ATTENTION : CHAQUE CLIC EST DÉFINITIF !</p>
        <p>🍷 4 Vins (3 pts) | 🧀 8 Fromages (2 pts)</p>
        <p>🥩 6 Charcuteries (2 pts) | 🥔 6 Chips (1 pt)</p>
      </div>
    </div>
  </div>

  <div id="panel-quiz" class="panel">
    <div id="quiz-content" style="display:none;">
      <div class="card">
        <div class="card-body">
          <div id="quiz-player-name" style="font-weight:bold; color:var(--brown);"></div>
          <div class="progress-bar"><div id="quiz-progress" class="progress-fill"></div></div>
          <div style="text-align:right; font-size:0.8rem;"><span id="count">0</span> / 24</div>
        </div>
      </div>
      <div id="quiz-vins-container"></div>
      <div id="quiz-fromages-container"></div>
      <div id="quiz-charcuteries-container"></div>
      <div id="quiz-chips-container"></div>
    </div>
  </div>

  <div id="panel-leaderboard" class="panel">
    <div class="card">
      <div class="card-header">🏆 Classement Live</div>
      <div class="card-body" id="leaderboard-content"></div>
    </div>
  </div>
</div>

<div class="footer">🤠 Joyeux 50 ans Alexandre !</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDdYbVOIyhQvHpzL2CbL9sCtoM5YJWLeuY",
    authDomain: "alexandre50.firebaseapp.com",
    projectId: "alexandre50",
    storageBucket: "alexandre50.firebasestorage.app",
    messagingSenderId: "159600747281",
    appId: "1:159600747281:web:09f382f707b2c481a922b0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const QUESTIONS = {
    vins: [{id:'v1',l:'Vin 1',o:['Bordeaux','Bourgogne','Rhône','Loire'],a:0},{id:'v2',l:'Vin 2',o:['Alsace','Bordeaux','Provence','Languedoc'],a:2},{id:'v3',l:'Vin 3',o:['Champagne','Chablis','Sancerre','Mâcon'],a:2},{id:'v4',l:'Vin 4',o:['Rhône','St-Emilion','Pomerol','Cahors'],a:3}],
    fromages: [{id:'f1',l:'Fr. 1',o:['Brie','Camembert','Coulommiers','Chaource'],a:1},{id:'f2',l:'Fr. 2',o:['Comté','Beaufort','Emmental','Gruyère'],a:0},{id:'f3',l:'Fr. 3',o:['Roquefort','Gorgonzola','Bleu Auvergne','Fourme'],a:0},{id:'f4',l:'Fr. 4',o:['Reblochon','Munster','Livarot','Époisses'],a:3},{id:'f5',l:'Fr. 5',o:['Chèvre','St-Maure','Crottin','Valençay'],a:2},{id:'f6',l:'Fr. 6',o:['Morbier','Tomme Savoie','Raclette','Abondance'],a:1},{id:'f7',l:'Fr. 7',o:['Maroilles','Pont-l\'Evêque','Livarot','Langres'],a:0},{id:'f8',l:'Fr. 8',o:['Ossau-Iraty','Mimolette','Cantal','Salers'],a:2}],
    charcuteries: [{id:'c1',l:'Char. 1',o:['Bayonne','Parme','Coppa','Bresaola'],a:0},{id:'c2',l:'Char. 2',o:['Saucisson','Chorizo','Salami','Sopressata'],a:0},{id:'c3',l:'Char. 3',o:['Rillettes','Pâté','Terrine','Mousse'],a:1},{id:'c4',l:'Char. 4',o:['Guémené','Andouillette','Boudin blanc','Boudin noir'],a:0},{id:'c5',l:'Char. 5',o:['Lard','Poitrine','Pancetta','Ventrèche'],a:3},{id:'c6',l:'Char. 6',o:['Noix Jambon','Rosette','Jésus','Saucisse'],a:1}],
    chips: [{id:'ch1',l:'Chips 1',o:['Nature','Barbecue','Vinaigre','Fromage'],a:0},{id:'ch2',l:'Chips 2',o:['Paprika','Jambon Beurre','Bolognaise','Poulet'],a:1},{id:'ch3',l:'Chips 3',o:['Ciboulette','Raclette','Tartiflette','Reblochon'],a:2},{id:'ch4',l:'Chips 4',o:['Ketchup','Maïs','Curry','Tapenade'],a:3},{id:'ch5',l:'Chips 5',o:['Mer','Cocktail','Citron','Langouste'],a:1},{id:'ch6',l:'Chips 6',o:['Piment','Chili','Jalapeño','Espelette'],a:3}]
  };

  const PTS = {vins:3, fromages:2, charcuteries:2, chips:1};
  let player = JSON.parse(localStorage.getItem('alex50_p')) || null;
  let ans = JSON.parse(localStorage.getItem('alex50_a_'+player?.id)) || {};

  function init() {
    onSnapshot(collection(db, 'scores'), (s) => {
      let ps = []; s.forEach(d => ps.push(d.data()));
      renderLB(ps);
    });
    if(player) showPanel('quiz');
  }

  window.showPanel = (n) => {
    document.querySelectorAll('.panel, .nav-btn').forEach(e => e.classList.remove('active'));
    document.getElementById('panel-'+n).classList.add('active');
    if(n==='quiz') setupQuiz();
  };

  window.registerPlayer = () => {
    const name = document.getElementById('player-name').value.trim();
    const table = document.getElementById('player-table').value.trim();
    if(!name) return;
    player = {id: Date.now().toString(36), name, table};
    localStorage.setItem('alex50_p', JSON.stringify(player));
    showPanel('quiz');
  };

  function setupQuiz() {
    if(!player) return;
    document.getElementById('quiz-content').style.display='block';
    document.getElementById('quiz-player-name').innerText = "🤠 " + player.name + (player.table ? " ("+player.table+")" : "");
    renderSection('vins', '🍷 Vins');
    renderSection('fromages', '🧀 Fromages');
    renderSection('charcuteries', '🥩 Charcuteries');
    renderSection('chips', '🥔 Chips');
    updateUI();
  }

  function renderSection(cat, title) {
    let h = `<div class="card"><div class="card-header">${title}</div><div class="card-body">`;
    QUESTIONS[cat].forEach(q => {
      h += `<div style="margin-bottom:1rem"><div style="font-size:0.8rem; font-weight:bold;">${q.l}</div><div class="options-grid">`;
      q.o.forEach((o, i) => {
        let sel = ans[q.id] === i;
        let done = ans[q.id] !== undefined;
        h += `<button class="opt-btn ${sel?'selected-hidden':''} ${done?'locked':''}" onclick="vote('${q.id}','${cat}',${i},${q.a},this)">${o}</button>`;
      });
      h += `</div></div>`;
    });
    document.getElementById(`quiz-${cat}-container`).innerHTML = h + `</div></div>`;
  }

  window.vote = async (qid, cat, idx, correct, btn) => {
    if(ans[qid] !== undefined) return;
    ans[qid] = idx;
    localStorage.setItem('alex50_a_'+player.id, JSON.stringify(ans));
    
    // UI : On grise tout et on met en avant le choix de l'utilisateur (sans dire si c'est juste)
    const grid = btn.closest('.options-grid');
    grid.querySelectorAll('.opt-btn').forEach(b => b.classList.add('locked'));
    btn.classList.add('selected-hidden');

    updateUI();
    const s = calc();
    await setDoc(doc(db, 'scores', player.id), { name:player.name, table:player.table, score:s, count:Object.keys(ans).length });

    if(Object.keys(ans).length === 24) {
      document.getElementById('finalScoreMsg').innerText = s + " / 50 points";
      document.getElementById('finishModal').style.display = 'block';
    }
  };

  function calc() {
    let total = 0;
    for(let c in QUESTIONS) {
      QUESTIONS[c].forEach(q => { if(ans[q.id] === q.a) total += PTS[c]; });
    }
    return total;
  }

  function updateUI() {
    const c = Object.keys(ans).length;
    document.getElementById('count').innerText = c;
    document.getElementById('quiz-progress').style.width = (c/24*100)+'%';
  }

  function renderLB(ps) {
    ps.sort((a,b) => b.score - a.score);
    let h = `<table class="leaderboard-table"><tr><th>#</th><th>Cowboy</th><th>Score</th></tr>`;
    ps.forEach((p, i) => {
      h += `<tr><td><span class="rank-badge">${i+1}</span></td><td><b>${p.name}</b><br><small>${p.table||''}</small></td><td>${p.score}</td></tr>`;
    });
    document.getElementById('leaderboard-content').innerHTML = h + `</table>`;
  }

  window.closeModal = () => { document.getElementById('finishModal').style.display='none'; showPanel('leaderboard'); };
  init();
</script>
</body>
</html>
