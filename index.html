<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDdYbVOIyhQvHpzL2CbL9sCtoM5YJWLeuY",
    authDomain: "alexandre50.firebaseapp.com",
    projectId: "alexandre50",
    storageBucket: "alexandre50.firebasestorage.app",
    messagingSenderId: "159600747281",
    appId: "1:159600747281:web:09f382f707b2c481a922b0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const QUESTIONS = {
    vins: [
      { id:'v1', label:'Vin 1', options:['Bordeaux / Cabernet','Bourgogne / Pinot Noir','Rhône / Syrah','Loire / Muscadet'], answer:0 },
      { id:'v2', label:'Vin 2', options:['Alsace / Riesling','Bordeaux / Sauvignon','Provence / Rosé','Languedoc / Grenache'], answer:2 },
      { id:'v3', label:'Vin 3', options:['Champagne / Chardonnay','Chablis / Chardonnay','Sancerre / Sauvignon','Mâcon / Aligoté'], answer:2 },
      { id:'v4', label:'Vin 4', options:['Côtes du Rhône / Grenache','Saint-Émilion / Merlot','Pomerol / Merlot','Cahors / Malbec'], answer:3 },
    ],
    fromages: [
      { id:'f1', label:'Fromage 1', options:['Brie de Meaux','Camembert','Coulommiers','Chaource'], answer:1 },
      { id:'f2', label:'Fromage 2', options:['Comté','Beaufort','Emmental','Gruyère'], answer:0 },
      { id:'f3', label:'Fromage 3', options:['Roquefort','Gorgonzola','Bleu d\'Auvergne','Fourme d\'Ambert'], answer:0 },
      { id:'f4', label:'Fromage 4', options:['Reblochon','Munster','Livarot','Époisses'], answer:3 },
      { id:'f5', label:'Fromage 5', options:['Chèvre frais','Saint-Maure de Touraine','Crottin de Chavignol','Valençay'], answer:2 },
      { id:'f6', label:'Fromage 6', options:['Morbier','Tomme de Savoie','Raclette','Abondance'], answer:1 },
      { id:'f7', label:'Fromage 7', options:['Maroilles','Pont-l\'Évêque','Livarot','Langres'], answer:0 },
      { id:'f8', label:'Fromage 8', options:['Ossau-Iraty','Mimolette','Cantal','Salers'], answer:2 },
    ],
    charcuteries: [
      { id:'c1', label:'Charcuterie 1', options:['Jambon de Bayonne','Jambon de Parme','Coppa','Bresaola'], answer:0 },
      { id:'c2', label:'Charcuterie 2', options:['Saucisson sec','Chorizo doux','Salami','Sopressata'], answer:0 },
      { id:'c3', label:'Charcuterie 3', options:['Rillettes du Mans','Pâté de campagne','Terrine de lapin','Mousse de foie'], answer:1 },
      { id:'c4', label:'Charcuterie 4', options:['Andouille de Guémené','Andouillette 5A','Boudin blanc','Boudin noir'], answer:0 },
      { id:'c5', label:'Charcuterie 5', options:['Lard fumé','Poitrine roulée','Pancetta','Ventrèche'], answer:3 },
      { id:'c6', label:'Charcuterie 6', options:['Noix de jambon','Rosette de Lyon','Jésus de Lyon','Saucisse sèche'], answer:1 },
    ],
    chips: [
      { id:'ch1', label:'Chips 1', options:['Nature','Barbecue','Sel & Vinaigre','Fromage'], answer:0 },
      { id:'ch2', label:'Chips 2', options:['Paprika','Jambon beurre','Bolognaise','Poulet rôti'], answer:1 },
      { id:'ch3', label:'Chips 3', options:['Crème & Ciboulette','Raclette','Tartiflette','Reblochon'], answer:2 },
      { id:'ch4', label:'Chips 4', options:['Ketchup','Maïs','Curry','Tapenade'], answer:3 },
      { id:'ch5', label:'Chips 5', options:['Saveur Mer','Cocktail de crevettes','Crevette-Citron','Langouste'], answer:1 },
      { id:'ch6', label:'Chips 6', options:['Piment doux','Chili mexicain','Jalapeño','Piment d\'Espelette'], answer:3 },
    ]
  };

  const POINTS = { vins:3, fromages:2, charcuteries:2, chips:1 };
  const MAX_SCORE = 42;
  const TOTAL_Q = 24;

  let currentPlayer = null;
  let answers = {};
  let allScores = {};

  function init() {
    const saved = localStorage.getItem('alex50_player');
    if (saved) {
      currentPlayer = JSON.parse(saved);
      const savedAns = localStorage.getItem('alex50_answers_' + currentPlayer.id);
      if (savedAns) answers = JSON.parse(savedAns);
    }

    const scoresCol = collection(db, 'scores');
    onSnapshot(scoresCol, (snapshot) => {
      allScores = {};
      snapshot.forEach(docSnap => allScores[docSnap.id] = docSnap.data());
      if (document.getElementById('panel-leaderboard').classList.contains('active')) {
        renderLeaderboard();
      }
    });
  }

  window.showPanel = function(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    const idx = {register:0, quiz:1, leaderboard:2}[name];
    document.querySelectorAll('.nav-btn')[idx].classList.add('active');

    if (name === 'quiz') setupQuiz();
    if (name === 'leaderboard') renderLeaderboard();
  };

  // Inscription (simplifiée)
  window.registerPlayer = async function() {
    const name = document.getElementById('player-name').value.trim();
    const table = document.getElementById('player-table').value.trim();
    const msg = document.getElementById('register-msg');

    if (!name) {
      msg.innerHTML = '<div class="msg msg-error">Entrez votre prénom !</div>';
      return;
    }

    const existing = Object.values(allScores).find(p => p.name?.toLowerCase() === name.toLowerCase());
    if (existing) {
      msg.innerHTML = `<div class="msg" style="background:#fff3cd;color:#856404;border:1px solid #ffe69c;">
        <strong>${name}</strong> est déjà inscrit !<br>
        <button class="btn" style="width:auto;margin-top:0.6rem;" onclick="confirmRegister('${name.replace(/'/g,"\\'")}','${table.replace(/'/g,"\\'")}')">Continuer quand même</button>
      </div>`;
      return;
    }
    confirmRegister(name, table);
  };

  window.confirmRegister = function(name, table) {
    const id = name.toLowerCase().replace(/[^a-z0-9]/g,'') + '_' + Math.random().toString(36).substring(2,6);
    currentPlayer = { name, table, id };
    localStorage.setItem('alex50_player', JSON.stringify(currentPlayer));
    document.getElementById('register-msg').innerHTML = `<div class="msg msg-success">Bienvenue <strong>${name}</strong> ! 🤠</div>`;
    setTimeout(() => showPanel('quiz'), 800);
  };

  function setupQuiz() {
    if (!currentPlayer) {
      document.getElementById('quiz-not-registered').style.display = 'block';
      document.getElementById('quiz-content').style.display = 'none';
      return;
    }
    document.getElementById('quiz-not-registered').style.display = 'none';
    document.getElementById('quiz-content').style.display = 'block';
    document.getElementById('quiz-player-label').textContent = '🤠 ' + currentPlayer.name + (currentPlayer.table ? ' — ' + currentPlayer.table : '');

    renderAllCategories();
    updateProgress();
    checkIfFinished(); // Vérifie si déjà terminé
  }

  function renderAllCategories() {
    renderCategory('vins', 'quiz-vins');
    renderCategory('fromages', 'quiz-fromages');
    renderCategory('charcuteries', 'quiz-charcuteries');
    renderCategory('chips', 'quiz-chips');
  }

  function renderCategory(cat, containerId) {
    const container = document.getElementById(containerId);
    let html = '';

    QUESTIONS[cat].forEach((q, qi) => {
      const selected = answers[q.id];
      html += `<div class="question-block">
        <div class="question-title">${q.label} <span style="float:right;color:var(--gold);font-size:0.75rem">+${POINTS[cat]} pts</span></div>
        <div class="options-grid">`;

      q.options.forEach((opt, oi) => {
        let cls = 'opt-btn';
        if (selected !== undefined) {
          cls += ' locked';
          if (oi === selected) cls += ' correct';   // Vert uniquement sur le choix du joueur
        }
        html += `<button class="${cls}" onclick="selectAnswer('${q.id}','${cat}',${oi},this)">${opt}</button>`;
      });

      html += `</div></div>`;
      if (qi < QUESTIONS[cat].length - 1) html += `<div style="height:1px;background:var(--cream-dark);margin:0.3rem 0;"></div>`;
    });

    container.innerHTML = html;
  }

  window.selectAnswer = async function(qId, cat, optionIdx, btn) {
    if (answers[qId] !== undefined) return;

    answers[qId] = optionIdx;
    localStorage.setItem('alex50_answers_' + currentPlayer.id, JSON.stringify(answers));

    const grid = btn.closest('.options-grid');
    grid.querySelectorAll('.opt-btn').forEach(b => {
      const oi = parseInt(b.getAttribute('onclick').match(/,(\d+),this/)[1]);
      b.classList.add('locked');
      b.classList.remove('correct', 'wrong');
      if (oi === optionIdx) b.classList.add('correct');
    });

    updateProgress();
    await pushScore();

    // Vérifier si toutes les questions sont répondues
    if (Object.keys(answers).length === TOTAL_Q) {
      setTimeout(showFinalScorePopup, 600);
    }
  };

  function updateProgress() {
    const answered = Object.keys(answers).length;
    document.getElementById('answered-count').textContent = answered;
    document.getElementById('total-count').textContent = TOTAL_Q;
    document.getElementById('quiz-progress').style.width = Math.round(answered / TOTAL_Q * 100) + '%';
  }

  async function pushScore() {
    if (!currentPlayer) return;

    let total = 0;
    const byCategory = { vins:0, fromages:0, charcuteries:0, chips:0 };

    Object.keys(QUESTIONS).forEach(cat => {
      QUESTIONS[cat].forEach(q => {
        if (answers[q.id] !== undefined && answers[q.id] === q.answer) {
          total += POINTS[cat];
          byCategory[cat] += POINTS[cat];
        }
      });
    });

    const data = {
      name: currentPlayer.name,
      table: currentPlayer.table || '',
      score: total,
      maxScore: MAX_SCORE,
      answered: Object.keys(answers).length,
      totalQuestions: TOTAL_Q,
      byCategory,
      ts: Date.now()
    };

    try {
      await setDoc(doc(db, 'scores', currentPlayer.id), data);
    } catch (e) { console.error(e); }
  }

  function showFinalScorePopup() {
    const score = computeCurrentScore();
    const percent = Math.round((score / MAX_SCORE) * 100);

    const popup = document.createElement('div');
    popup.style.cssText = `
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      background:var(--cream); color:var(--text-dark); padding:2rem; border-radius:16px;
      border:4px solid var(--gold); box-shadow:0 10px 30px rgba(0,0,0,0.5);
      text-align:center; max-width:320px; z-index:1000; font-family:'Lato',sans-serif;
    `;
    popup.innerHTML = `
      <h2 style="color:var(--brown); margin-bottom:1rem;">🎉 Dégustation terminée !</h2>
      <p style="font-size:1.1rem;">Ton score :</p>
      <div style="font-size:3rem; font-family:'Rye',serif; color:var(--gold); margin:0.5rem 0;">
        ${score} / ${MAX_SCORE}
      </div>
      <p style="font-size:1.3rem; color:var(--green-dark);">${percent}% de bonnes réponses</p>
      <button onclick="this.parentElement.remove()" class="btn" style="margin-top:1.5rem;width:100%;">
        Voir le classement
      </button>
    `;
    document.body.appendChild(popup);

    // Aller automatiquement sur le classement après fermeture du popup
    popup.querySelector('button').addEventListener('click', () => {
      showPanel('leaderboard');
    });
  }

  function computeCurrentScore() {
    let total = 0;
    Object.keys(QUESTIONS).forEach(cat => {
      QUESTIONS[cat].forEach(q => {
        if (answers[q.id] !== undefined && answers[q.id] === q.answer) {
          total += POINTS[cat];
        }
      });
    });
    return total;
  }

  function renderLeaderboard() {
    const players = Object.values(allScores)
      .sort((a, b) => (b.score || 0) - (a.score || 0) || (b.answered || 0) - (a.answered || 0));

    const container = document.getElementById('leaderboard-content');

    if (!players.length) {
      container.innerHTML = '<p style="text-align:center;color:#999;padding:2rem 0;">Pas encore de participants...</p>';
      return;
    }

    let html = `<table class="leaderboard-table"><thead><tr>
      <th>#</th><th>Cowboy / Cowgirl</th><th>Score</th>
    </tr></thead><tbody>`;

    players.forEach((p, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? 'rank-' + rank : 'rank-other';
      const isCurrent = currentPlayer && p.name.toLowerCase() === currentPlayer.name.toLowerCase();

      html += `<tr style="${isCurrent ? 'background:rgba(201,147,10,0.15);' : ''}">
        <td><span class="rank-badge ${rankClass}">${rank}</span></td>
        <td class="name-cell">${esc(p.name)}${p.table ? `<br><span style="font-size:0.72rem;color:#888;">${esc(p.table)}</span>` : ''}${isCurrent ? ' <span style="color:var(--gold);">(toi)</span>' : ''}</td>
        <td class="score-cell">${p.score || 0}<span style="font-size:0.7rem;color:#aaa">/${MAX_SCORE}</span></td>
      </tr>`;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
