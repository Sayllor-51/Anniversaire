<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤠 Alexandre a 50 ans ! - Le Jeu du Saloon</title>
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES DE DESIGN --- */
        :root {
            --brown: #5C3A1E;
            --brown-light: #8B5E3C;
            --gold: #C9930A;
            --gold-light: #F0B429;
            --cream: #F5EDD6;
            --cream-dark: #E8D9B5;
            --red: #8B1A1A;
            --green: #2D4A1E;
            --text-dark: #2C1810;
            --shadow: rgba(0,0,0,0.4);
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--brown);
            background-image: 
                linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 12px);
            font-family: 'Lato', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* --- HEADER & BADGE 50 ANS --- */
        .header {
            background: linear-gradient(135deg, var(--red) 0%, var(--brown) 50%, var(--red) 100%);
            border-bottom: 6px solid var(--gold);
            text-align: center;
            padding: 3rem 1rem;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .header h1 {
            font-family: 'Rye', serif;
            font-size: clamp(1.8rem, 8vw, 3.8rem);
            color: var(--gold-light);
            text-shadow: 3px 3px 0 var(--brown);
            letter-spacing: 2px;
        }

        .header p {
            color: white;
            font-family: 'Playfair Display', serif;
            letter-spacing: 4px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .age-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--gold);
            color: var(--brown);
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Rye', serif;
            border: 3px double white;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            transform: rotate(12deg);
            z-index: 10;
        }

        .age-badge span { font-size: 1.8rem; font-weight: bold; line-height: 1; }
        .age-badge small { font-size: 0.7rem; text-transform: uppercase; }

        /* --- NAVIGATION --- */
        .nav {
            display: flex;
            justify-content: center;
            background: var(--brown);
            border-bottom: 3px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--cream-dark);
            font-family: 'Lato', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 1.3rem;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
            max-width: 250px;
        }

        .nav-btn.active {
            color: var(--gold-light);
            border-bottom: 4px solid var(--gold-light);
            background: rgba(255,255,255,0.05);
        }

        /* --- STRUCTURE --- */
        .main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .card {
            background: var(--cream);
            border-radius: 15px;
            border: 2px solid var(--gold);
            box-shadow: 0 8px 25px var(--shadow);
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(90deg, var(--brown) 0%, var(--brown-light) 100%);
            color: var(--gold-light);
            font-family: 'Rye', serif;
            padding: 1.2rem;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--gold);
        }

        .card-body { padding: 1.5rem; }

        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }

        /* --- INPUTS & BOUTONS --- */
        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 2px solid var(--cream-dark);
            font-size: 1.1rem;
            font-family: 'Lato', sans-serif;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: var(--brown);
            border: none;
            border-radius: 8px;
            font-family: 'Rye', serif;
            padding: 1.2rem;
            width: 100%;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: 0 5px 0 #8c6607;
            transition: 0.1s;
        }

        .btn-gold:active { transform: translateY(3px); box-shadow: 0 2px 0 #8c6607; }

        /* --- QUIZ --- */
        .q-block {
            margin-bottom: 2rem;
            border-bottom: 1px dashed var(--brown-light);
            padding-bottom: 1.5rem;
        }

        .q-title {
            font-weight: 900;
            color: var(--brown);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .opt-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .opt-btn {
            background: white;
            border: 2px solid var(--cream-dark);
            border-radius: 8px;
            padding: 14px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }

        .opt-btn.selected {
            background: var(--brown) !important;
            color: white !important;
        }

        .opt-btn.locked {
            pointer-events: none;
            opacity: 0.7;
        }

        /* --- LEADERBOARD & SCROLL --- */
        .lb-scroll {
            max-height: 550px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .lb-scroll::-webkit-scrollbar { width: 10px; }
        .lb-scroll::-webkit-scrollbar-track { background: var(--cream-dark); border-radius: 10px; }
        .lb-scroll::-webkit-scrollbar-thumb { 
            background: var(--gold); 
            border-radius: 10px; 
            border: 2px solid var(--brown);
        }

        .lb-table { width: 100%; border-collapse: collapse; }
        .lb-table td { padding: 15px 10px; border-bottom: 1px solid var(--cream-dark); }
        
        .rank-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-weight: bold;
            font-family: 'Rye', serif;
            background: var(--cream-dark);
        }
        .top1 { background: var(--gold); color: white; border: 2px solid var(--brown); }

        /* --- POP-UP MODAL --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center;
            justify-content: center; z-index: 2000; padding: 20px;
        }

        .modal-content {
            background: var(--cream);
            border: 4px solid var(--gold);
            border-radius: 20px;
            padding: 40px 20px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 40px var(--shadow);
            animation: modalPop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.3);
        }

        @keyframes modalPop { from {transform: scale(0.5); opacity: 0;} to {transform: scale(1); opacity: 1;} }

        .modal-icon { font-size: 5rem; margin-bottom: 15px; }
        .modal-title { font-family: 'Rye', serif; font-size: 2rem; margin-bottom: 10px; }
        .modal-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; }

        /* --- PROGRESS --- */
        .pg-bar { background: var(--cream-dark); border-radius: 20px; height: 16px; overflow: hidden; margin-top: 10px; }
        .pg-fill { height: 100%; background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%); transition: width 0.6s; }

        @media (max-width: 500px) { .opt-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="modal-content">
            <div id="modal-icon" class="modal-icon">🌵</div>
            <div id="modal-title" class="modal-title">TITRE</div>
            <div id="modal-text" class="modal-text">Message ici...</div>
            <button class="btn-gold" onclick="closeModal()">SUIVANT !</button>
        </div>
    </div>

    <div class="header">
        <div class="age-badge"><span>50</span><small>ans</small></div>
        <h1>🤠 Alexandre 50's</h1>
        <p>Le Grand Jeu du Saloon</p>
    </div>

    <nav class="nav">
        <button class="nav-btn active" id="nav-register" onclick="showPanel('register')">L'Équipe</button>
        <button class="nav-btn" id="nav-quiz" onclick="showPanel('quiz')">Dégustation</button>
        <button class="nav-btn" id="nav-leaderboard" onclick="showPanel('leaderboard')">Les Scores</button>
    </nav>

    <div class="main">
        <div id="panel-register" class="panel active">
            <div class="card">
                <div class="card-header">🐎 BIENVENUE AU RANCH</div>
                <div class="card-body">
                    <p style="margin-bottom:20px; font-weight:700; color:var(--red); text-align:center;">
                        "Unissez vos forces : les enfants pour les chips, les adultes pour le vin !"
                    </p>
                    <input type="text" id="p-name" class="input-field" placeholder="Nom de l'équipe (ex: Les Dalton)">
                    <input type="text" id="p-table" class="input-field" placeholder="Nom de votre table">
                    <button class="btn-gold" onclick="register()">🌵 REJOINDRE LE SALOON</button>
                </div>
            </div>
        </div>

        <div id="panel-quiz" class="panel">
            <div class="card">
                <div class="card-body">
                    <div id="q-player-name" style="font-family:'Rye'; font-size:1.4rem; color:var(--brown);">Cowboy : ...</div>
                    <div class="pg-bar"><div class="pg-fill" id="q-progress-fill" style="width:0%"></div></div>
                    <p style="text-align:right; font-size:0.8rem; font-weight:700; margin-top:5px;">
                        <span id="q-done-count">0</span> / 24 ANALYSES TERMINÉES
                    </p>
                </div>
            </div>
            <div id="quiz-render-area"></div>
        </div>

        <div id="panel-leaderboard" class="panel">
            <div class="card">
                <div class="card-header">🏆 SCOREBOARD LIVE</div>
                <div class="card-body">
                    <div class="lb-scroll">
                        <table class="lb-table" id="lb-body">
                            <tr><td align="center">Chargement des hors-la-loi...</td></tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDdYbVOIyhQvHpzL2CbL9sCtoM5YJWLeuY",
            authDomain: "alexandre50.firebaseapp.com",
            projectId: "alexandre50",
            storageBucket: "alexandre50.firebasestorage.app",
            messagingSenderId: "159600747281",
            appId: "1:159600747281:web:09f382f707b2c481a922b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- QUESTIONS DÉTAILLÉES (24 items) ---
        const QUESTIONS = {
            vins: [
                { id: 'v1', label: 'Vin Blanc n°1', options: ['Sauvignon', 'Chardonnay', 'Viognier', 'Chenin'], answer: 1 },
                { id: 'v2', label: 'Vin Blanc n°2', options: ['Chablis', 'Sancerre', 'Meursault', 'Riesling'], answer: 2 },
                { id: 'v3', label: 'Vin Rouge n°1', options: ['Pinot Noir', 'Syrah', 'Merlot', 'Gamay'], answer: 0 },
                { id: 'v4', label: 'Vin Rouge n°2', options: ['Bordeaux', 'Côte du Rhône', 'Beaujolais', 'Chinon'], answer: 3 }
            ],
            fromages: [
                { id: 'f1', label: 'Fromage 1', options: ['Camembert', 'Brie', 'Coulommiers', 'Chaource'], answer: 0 },
                { id: 'f2', label: 'Fromage 2', options: ['Comté 12m', 'Comté 24m', 'Beaufort', 'Abondance'], answer: 1 },
                { id: 'f3', label: 'Fromage 3', options: ['Morbier', 'Raclette', 'Saint-Nectaire', 'Reblochon'], answer: 2 },
                { id: 'f4', label: 'Fromage 4', options: ['Roquefort', 'Bleu d\'Auv.', 'Fourme d\'Amb.', 'Gorgonzola'], answer: 0 },
                { id: 'f5', label: 'Fromage 5', options: ['Chèvre Frais', 'Sainte-Maure', 'Crottin', 'Pélardon'], answer: 1 },
                { id: 'f6', label: 'Fromage 6', options: ['Munster', 'Époisses', 'Livarot', 'Maroilles'], answer: 1 },
                { id: 'f7', label: 'Fromage 7', options: ['Ossau-Iraty', 'Manchego', 'Cantal', 'Salers'], answer: 0 },
                { id: 'f8', label: 'Fromage 8', options: ['Tomme Sav.', 'Tomme Brebis', 'Mimolette', 'Gruyère'], answer: 2 }
            ],
            charcuteries: [
                { id: 'c1', label: 'Charcuterie 1', options: ['Bayonne', 'Serrano', 'Parme', 'San Daniele'], answer: 0 },
                { id: 'c2', label: 'Charcuterie 2', options: ['Rosette', 'Saucisson Sec', 'Jésus', 'Chorizo'], answer: 3 },
                { id: 'c3', label: 'Charcuterie 3', options: ['Coppa', 'Pancetta', 'Lomo', 'Bresaola'], answer: 0 },
                { id: 'c4', label: 'Charcuterie 4', options: ['Andouille', 'Andouillette', 'Boudin Noir', 'Saucisson Ail'], answer: 0 },
                { id: 'c5', label: 'Charcuterie 5', options: ['Rillettes', 'Pâté Camp.', 'Terrine Sanglier', 'Mousse Canard'], answer: 1 },
                { id: 'c6', label: 'Charcuterie 6', options: ['Grisons', 'Cécina', 'Noix Jambon', 'Magret Séché'], answer: 2 }
            ],
            chips: [
                { id: 'ch1', label: 'Bret\'s n°1', options: ['Nature', 'Guérande', 'Barbecue', 'Poulet'], answer: 1 },
                { id: 'ch2', label: 'Bret\'s n°2', options: ['Oignon Grillé', 'Fromage Jura', 'Camembert', 'Chèvre'], answer: 0 },
                { id: 'ch3', label: 'Bret\'s n°3', options: ['Aioli', 'Pesto', 'Tartine Grillée', 'Cheddar'], answer: 0 },
                { id: 'ch4', label: 'Bret\'s n°4', options: ['Vinaigre', 'Moutarde', 'Pickles', 'Ketchup'], answer: 1 },
                { id: 'ch5', label: 'Bret\'s n°5', options: ['Espelette', 'Chili', 'Curry', 'Mexicaine'], answer: 0 },
                { id: 'ch6', label: 'Bret\'s n°6', options: ['Truffe', 'Cèpes', 'Morilles', 'Champignons'], answer: 1 }
            ]
        };

        const BAREME = { vins: 3, fromages: 2, charcuteries: 2, chips: 1 };
        let player = JSON.parse(localStorage.getItem('alex_p'));
        let myAns = player ? (JSON.parse(localStorage.getItem('ans_' + player.id)) || {}) : {};
        let scores = {};

        // --- NAVIGATION ---
        window.showPanel = (id) => {
            document.querySelectorAll('.panel, .nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('panel-'+id).classList.add('active');
            document.getElementById('nav-'+id).classList.add('active');
            if(id === 'quiz') renderQuiz();
            if(id === 'leaderboard') renderLB();
            window.scrollTo(0,0);
        };

        // --- INSCRIPTION ---
        window.register = () => {
            const name = document.getElementById('p-name').value.trim();
            if(!name) return alert("Veuillez entrer un nom d'équipe !");
            const id = name.toLowerCase().replace(/[^a-z]/g, '') + "_" + Math.floor(Math.random()*999);
            player = { id, name, table: document.getElementById('p-table').value };
            localStorage.setItem('alex_p', JSON.stringify(player));
            showPanel('quiz');
        };

        // --- QUIZ LOGIC ---
        function renderQuiz() {
            if(!player) return showPanel('register');
            document.getElementById('q-player-name').textContent = "🤠 Équipe : " + player.name;
            
            let html = "";
            const cats = { vins: '🍷 LES VINS (3 pts)', fromages: '🧀 LES FROMAGES (2 pts)', charcuteries: '🥩 CHARCUTERIES (2 pts)', chips: '🥔 CHIPS BRET\'S (1 pt)' };
            
            for(const c in QUESTIONS) {
                html += `<div class="card"><div class="card-header">${cats[c]}</div><div class="card-body">`;
                QUESTIONS[c].forEach(q => {
                    const picked = myAns[q.id];
                    html += `<div class="q-block"><div class="q-title">${q.label}</div><div class="opt-grid">`;
                    q.options.forEach((opt, idx) => {
                        let cls = "opt-btn";
                        if(picked !== undefined) {
                            cls += " locked";
                            if(idx === picked) cls += " selected";
                        }
                        html += `<button class="${cls}" onclick="vote('${q.id}', '${c}', ${idx})">${opt}</button>`;
                    });
                    html += `</div></div>`;
                });
                html += `</div></div>`;
            }
            document.getElementById('quiz-render-area').innerHTML = html;
            const count = Object.keys(myAns).length;
            document.getElementById('q-done-count').textContent = count;
            document.getElementById('q-progress-fill').style.width = (count/24*100) + "%";
        }

        window.vote = async (qid, cat, choice) => {
            if(myAns[qid] !== undefined) return;

            // Récupérer la question pour vérifier
            const question = QUESTIONS[cat].find(x => x.id === qid);
            const correct = (question.answer === choice);

            // Pop-up Feedback
            const modal = document.getElementById('modal-overlay');
            const mTitle = document.getElementById('modal-title');
            const mIcon = document.getElementById('modal-icon');
            const mText = document.getElementById('modal-text');

            modal.style.display = 'flex';
            if(correct) {
                mIcon.textContent = "🎯"; mTitle.textContent = "BIEN JOUÉ !";
                mTitle.style.color = "var(--green)";
                mText.textContent = "C'est une excellente réponse !";
            } else {
                mIcon.textContent = "🌵"; mTitle.textContent = "OUILLE...";
                mTitle.style.color = "var(--red)";
                mText.textContent = "Ce n'est pas tout à fait ça...";
            }

            myAns[qid] = choice;
            localStorage.setItem('ans_' + player.id, JSON.stringify(myAns));

            // Calcul Score
            let total = 0; let byCat = { vins:0, fromages:0, charcuteries:0, chips:0 };
            for(const c in QUESTIONS) {
                QUESTIONS[c].forEach(q => { if(myAns[q.id] === q.answer) { total += BAREME[c]; byCat[c] += BAREME[c]; } });
            }

            await setDoc(doc(db, "scores", player.id), { 
                name: player.name, table: player.table, score: total, byCat, lastUpdate: Date.now() 
            });
        };

        window.closeModal = () => {
            document.getElementById('modal-overlay').style.display = 'none';
            renderQuiz();
        };

        // --- LEADERBOARD ---
        function renderLB() {
            const list = Object.values(scores).sort((a,b) => b.score - a.score);
            let html = `<table class="lb-table">`;
            list.forEach((p, i) => {
                html += `<tr>
                    <td width="50"><span class="rank-pill ${i===0?'top1':''}">${i+1}</span></td>
                    <td><b>${p.name}</b><br><small>${p.table||''}</small></td>
                    <td align="right"><b style="color:var(--red); font-size:1.3rem;">${p.score}</b><small> pts</small></td>
                </tr>`;
            });
            document.getElementById('lb-body').innerHTML = html + "</table>";
        }

        onSnapshot(collection(db, "scores"), (snap) => {
            snap.forEach(d => scores[d.id] = d.data());
            if(document.getElementById('panel-leaderboard').classList.contains('active')) renderLB();
        });

        if(player) showPanel('quiz');
    </script>
</body>
</html>
